<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#080808">
  <meta name="color-scheme" content="dark">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src data:; base-uri 'none'; form-action 'none'">
  <title>Legal Arena — Security Deposit Showdown</title>
  <style>
    :root{--ink:#f4f0e8;--muted:#a7a29a;--line:rgba(255,255,255,.1);--panel:rgba(20,20,19,.84);--gold:#e4bd70;--red:#d66358;--green:#83c5a0;--blue:#7bb6d9;--shadow:0 24px 70px rgba(0,0,0,.45)}
    *{box-sizing:border-box}html{min-height:100%;background:#070707}body{margin:0;min-height:100vh;color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at 15% -10%,rgba(228,189,112,.18),transparent 34%),radial-gradient(circle at 100% 10%,rgba(99,75,44,.13),transparent 25%),linear-gradient(150deg,#090908,#050505 60%,#0b0907);letter-spacing:.005em}
    body:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.17;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:34px 34px;mask-image:linear-gradient(to bottom,black,transparent 75%)}
    button,textarea,a{font:inherit}button,a{touch-action:manipulation}.shell{width:min(1180px,100%);min-height:100vh;margin:auto;padding:22px clamp(16px,3vw,42px) 42px;position:relative}.topbar{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:clamp(28px,5vw,66px)}
    .brand{display:flex;align-items:center;gap:12px;color:var(--ink);text-decoration:none}.mark{width:42px;height:42px;object-fit:contain;border-radius:8px}.brand-name{font-family:Georgia,serif;font-size:18px;letter-spacing:.08em;text-transform:uppercase}.full-link{color:#cfc8bc;text-decoration:none;font-size:13px;border-bottom:1px solid rgba(228,189,112,.45);padding-bottom:3px}.full-link:hover{color:#fff;border-color:var(--gold)}
    .hero{max-width:840px;margin:clamp(32px,8vh,100px) auto 0;text-align:center}.eyebrow{color:var(--gold);font-size:11px;font-weight:800;letter-spacing:.23em;text-transform:uppercase}.hero h1,.verdict-title{margin:18px 0 16px;font-family:Georgia,"Times New Roman",serif;font-size:clamp(44px,9vw,88px);font-weight:500;line-height:.94;letter-spacing:-.04em}.hero p{max-width:670px;margin:0 auto;color:#bcb6ad;font-size:clamp(16px,2vw,20px);line-height:1.7}.case-pill{display:inline-flex;margin:30px 0 0;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.035);color:#d6d0c5;font-size:13px}.dot{width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 14px var(--gold)}
    .primary,.secondary,.suggestion{border:0;cursor:pointer;transition:.18s ease}.primary{display:inline-flex;align-items:center;justify-content:center;gap:10px;margin-top:34px;min-height:52px;padding:0 26px;border-radius:10px;background:var(--ink);color:#111;font-weight:800;box-shadow:0 12px 36px rgba(228,189,112,.13)}.primary:hover{transform:translateY(-1px);background:#fff}.primary:disabled,.secondary:disabled{cursor:not-allowed;opacity:.45;transform:none}.arrow{font-size:19px}.fine{margin-top:16px;color:#77736c;font-size:12px}
    .workspace{display:grid;grid-template-columns:minmax(0,1.55fr) minmax(280px,.72fr);gap:18px;align-items:start}.case-head{grid-column:1/-1;display:flex;align-items:end;justify-content:space-between;gap:20px;border-bottom:1px solid var(--line);padding-bottom:22px;margin-bottom:4px}.case-head h1{font-family:Georgia,serif;font-weight:500;font-size:clamp(30px,5vw,52px);line-height:1;margin:8px 0 0;letter-spacing:-.025em}.stage-count{color:#aaa49a;font-size:13px;white-space:nowrap}.panel{border:1px solid var(--line);border-radius:16px;background:linear-gradient(180deg,rgba(27,27,25,.88),rgba(14,14,13,.88));box-shadow:var(--shadow);overflow:hidden;backdrop-filter:blur(12px)}.panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.025)}.panel-title{font-size:12px;text-transform:uppercase;letter-spacing:.16em;font-weight:800;color:#d8d1c6}.panel-body{padding:18px}.transcript{display:flex;flex-direction:column;gap:13px;max-height:440px;overflow:auto;scrollbar-width:thin;padding-right:3px}.message{max-width:87%;padding:13px 15px;border-radius:13px;color:#ded9d0;font-size:14px;line-height:1.55;border:1px solid transparent}.message.party,.message.opponent{align-self:flex-start;background:rgba(255,255,255,.055);border-color:rgba(255,255,255,.06)}.message.player{align-self:flex-end;background:rgba(228,189,112,.11);border-color:rgba(228,189,112,.2);color:#f6ead3}.speaker{display:block;margin-bottom:5px;color:#8f8a82;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.13em}.player .speaker{color:#c9a866}.composer{border-top:1px solid var(--line);padding:16px}.composer textarea{display:block;width:100%;resize:vertical;min-height:98px;max-height:230px;border:1px solid var(--line);border-radius:10px;padding:13px 14px;background:#090909;color:#f2eee7;outline:none;line-height:1.55}.composer textarea:focus{border-color:rgba(228,189,112,.55);box-shadow:0 0 0 3px rgba(228,189,112,.07)}.compose-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:11px}.hint{color:#77736b;font-size:11px}.secondary{min-height:42px;padding:0 17px;border-radius:8px;background:var(--gold);color:#18130c;font-weight:800}.suggestions{display:grid;gap:8px;margin-bottom:14px}.suggestion{text-align:left;padding:11px 12px;border-radius:9px;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.075);color:#c8c2b8;font-size:12px;line-height:1.45}.suggestion:hover{border-color:rgba(228,189,112,.35);color:#fff;background:rgba(228,189,112,.07)}
    .brief-item+.brief-item{margin-top:18px;padding-top:18px;border-top:1px solid rgba(255,255,255,.07)}.brief-label{color:#817d76;text-transform:uppercase;letter-spacing:.14em;font-weight:800;font-size:9px}.brief-value{margin:7px 0 0;color:#d8d3ca;font-size:13px;line-height:1.55}.list{margin:8px 0 0;padding-left:18px;color:#c7c1b8;font-size:13px;line-height:1.55}.list li+li{margin-top:5px}.review{grid-column:1/-1}.review-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.review-card{min-height:150px;padding:16px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.025)}.review-card h3{margin:0;color:var(--gold);font-size:11px;text-transform:uppercase;letter-spacing:.14em}.review-card p,.review-card li{font-size:13px;line-height:1.55;color:#c7c1b8}.review-action{text-align:center;padding-top:22px}.review-action .primary{margin-top:0}
    .score{display:grid;grid-template-columns:1fr 1fr;gap:8px}.score-box{padding:12px;border:1px solid var(--line);border-radius:10px;background:rgba(255,255,255,.025)}.score-num{display:block;margin-top:4px;font:32px Georgia,serif}.you{color:var(--gold)}.them{color:#bcb7af}.bench{margin-top:15px;padding:13px;border-left:2px solid var(--gold);background:rgba(228,189,112,.055);color:#c9c2b7;font-size:13px;line-height:1.55}.court .transcript{max-height:510px}.round-tag{display:block;color:#817d76;font-size:9px;letter-spacing:.13em;text-transform:uppercase;margin-bottom:3px}
    .verdict{max-width:900px;margin:30px auto;text-align:center}.seal{width:72px;height:72px;margin:auto;border-radius:50%;display:grid;place-items:center;border:1px solid rgba(228,189,112,.45);color:var(--gold);font:32px Georgia,serif;background:rgba(228,189,112,.06);box-shadow:0 0 50px rgba(228,189,112,.08)}.verdict-title{font-size:clamp(42px,8vw,76px)}.ruling{max-width:750px;margin:0 auto;color:#c9c3ba;font-size:17px;line-height:1.7}.result-chip{display:inline-block;margin:17px 0;color:var(--gold);font-size:12px;letter-spacing:.16em;text-transform:uppercase;font-weight:800}.verdict-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:28px auto;max-width:750px;text-align:left}.verdict-card{border:1px solid var(--line);border-radius:12px;padding:17px;background:rgba(255,255,255,.025)}.verdict-card h3{margin:0 0 10px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--green)}.verdict-card.concerns h3{color:#e39a91}.cta{margin-top:30px;padding:30px;border:1px solid rgba(228,189,112,.25);border-radius:16px;background:linear-gradient(135deg,rgba(228,189,112,.11),rgba(255,255,255,.025))}.cta h2{margin:0;font:32px Georgia,serif}.cta p{color:#a9a39a}.cta .primary{text-decoration:none;margin-top:13px}
    .state{max-width:620px;margin:11vh auto;text-align:center}.state-icon{font-size:38px}.state h1{font:42px Georgia,serif;margin:18px 0 12px}.state p{color:#aaa49b;line-height:1.65}.inline-thinking{display:flex;align-items:center;gap:9px;margin-top:12px;color:#b9b2a7;font-size:12px;font-weight:700}.mini-loader{width:16px;height:16px;border:2px solid rgba(255,255,255,.16);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;flex:0 0 auto}@keyframes spin{to{transform:rotate(360deg)}}.status{position:fixed;z-index:20;left:50%;bottom:18px;transform:translateX(-50%) translateY(30px);opacity:0;pointer-events:none;padding:11px 15px;border-radius:999px;background:#eee8dc;color:#17130e;font-size:12px;font-weight:750;box-shadow:0 12px 35px #000;transition:.2s}.status.show{opacity:1;transform:translateX(-50%) translateY(0)}.status.bad{background:#c95e55;color:#fff}.offline{display:none;position:fixed;z-index:30;inset:0 0 auto;background:#9d453f;color:#fff;text-align:center;font-size:12px;font-weight:750;padding:8px}.offline.show{display:block}
    @media(max-width:800px){.shell{padding-top:16px}.topbar{margin-bottom:30px}.workspace{grid-template-columns:1fr}.case-head{align-items:start;flex-direction:column}.side{grid-row:auto}.review-grid{grid-template-columns:1fr}.verdict-grid{grid-template-columns:1fr}.message{max-width:94%}.brand-name{font-size:15px}.full-link{font-size:11px}.hero{margin-top:8vh}.hero h1{font-size:clamp(42px,15vw,68px)}.panel-body{padding:14px}.composer{padding:14px}.transcript{max-height:46vh}}
    @media(max-width:440px){.shell{padding-left:12px;padding-right:12px}.topbar{gap:10px}.mark{width:29px}.brand-name{font-size:13px;letter-spacing:.06em}.case-pill{font-size:11px}.compose-row{align-items:flex-end}.hint{max-width:145px}.secondary{padding:0 13px}.cta{padding:22px 14px}}
  </style>

      const body = options.body ? JSON.parse(options.body) : {};
      if (path === "/start") { game=initialGame(); token="offline"; saveOfflineGame(); return {token,caseSession:game}; }
      if (path === "/session") { if(!game) throw Object.assign(new Error("No saved offline case was found."),{code:"invalid_session"}); return {caseSession:game}; }
      if (path === "/interview") runOfflineInterview(String(body.question||"").trim());
      else if (path === "/finalize") game.stage="courtroom";
      else if (path === "/courtroom") runOfflineCourtroom(String(body.argument||"").trim());
      saveOfflineGame();
      return {caseSession:game};
    }
    function landing() {
      app.innerHTML = `<section class="hero"><div class="eyebrow">A playable Legal Arena case</div><h1>Security Deposit<br>Showdown</h1><p>Interview your client. Build the record. Face opposing counsel before the judge. You have three questions and three courtroom arguments to win back Maya Chen’s deposit.</p><div class="case-pill"><span class="dot"></span>Civic Claims Court · Housing dispute · 8–12 minutes</div><br><button id="start" class="primary">Take the case <span class="arrow">→</span></button><div class="fine">No account · No server · Fully playable offline</div></section>`;
      document.getElementById("start").onclick = start;
    }
    function renderError(error) {
      const capped = ["daily_limit","global_cap"].includes(error.code);
      const expired = error.code === "session_expired";
      app.innerHTML = `<section class="state"><div class="state-icon">${capped ? "⌛" : expired ? "§" : "⚠"}</div><div class="eyebrow">${capped ? "Demo limit reached" : expired ? "Session expired" : "Court interrupted"}</div><h1>${capped ? "Today’s case is closed." : expired ? "This session has ended." : "We hit a snag."}</h1><p>${esc(error.message)}</p><a class="primary" href="https://legalarena.app" target="_blank" rel="noopener noreferrer">Play Legal Arena <span class="arrow">→</span></a></section>`;
    }
    async function start() {
      if (busy) return; setBusy(true, "Opening the case file");
      try {
        const data = await request("/start", { method:"POST", body:JSON.stringify({ browserId: browserId() }) });
        token = data.token; localStorage.setItem(TOKEN_KEY, token); game = data.caseSession; busy = false; render();
      } catch (error) { busy = false; renderError(error); }
    }
    async function resume() {
      if (game) return render();
      try { const data = await request("/session"); game = data.caseSession; render(); }
      catch (error) { localStorage.removeItem(TOKEN_KEY); landing(); }
    }
    const header = () => `<div class="case-head"><div><div class="eyebrow">${esc(game.premise.courtName)}</div><h1>${esc(game.title)}</h1></div><div class="stage-count">${game.stage === "interview" ? `Client intake · ${game.limits.interview.used} / ${game.limits.interview.total} questions` : `Courtroom · ${game.limits.courtroom.used} / ${game.limits.courtroom.total} arguments`}</div></div>`;
    const brief = () => `<aside class="panel side"><div class="panel-head"><span class="panel-title">Case brief</span></div><div class="panel-body"><div class="brief-item"><div class="brief-label">Client</div><p class="brief-value">${esc(game.premise.clientName)}</p></div><div class="brief-item"><div class="brief-label">Opponent</div><p class="brief-value">${esc(game.premise.opponentName)}</p></div><div class="brief-item"><div class="brief-label">Dispute</div><p class="brief-value">${esc(game.premise.overview)}</p></div><div class="brief-item"><div class="brief-label">Relief sought</div><p class="brief-value">${esc(game.premise.desiredRelief)}</p></div></div></aside>`;
    function renderIntake() {
      const used = game.limits.interview.used, done = used >= game.limits.interview.total;
      const transcript = game.interviewTranscript.map(m => `<div class="message ${m.role === "player" ? "player" : "party"}"><span class="speaker">${esc(m.role === "player" ? "You" : m.speaker)}</span>${esc(m.text)}</div>`).join("");
      app.innerHTML = `<section class="workspace">${header()}<div class="panel"><div class="panel-head"><span class="panel-title">Private client intake</span><span class="stage-count">Ask precise questions</span></div><div class="panel-body"><div id="transcript" class="transcript">${transcript}</div></div>${done ? "" : `<form id="intake-form" class="composer"><textarea id="question" maxlength="1600" required placeholder="Ask Maya anything about her case…"></textarea><div class="compose-row"><span class="hint">Question ${used + 1} of 3 · Enter to send</span><button class="secondary" type="submit">Ask Maya →</button></div></form>`}</div>${brief()}${done ? review() : ""}</section>`;
      scrollTranscript();
      const form = document.getElementById("intake-form"); if (form) { form.onsubmit = submitQuestion; bindEnterToSubmit(document.getElementById("question"), form); }
      const court = document.getElementById("enter-court"); if (court) court.onclick = finalize;
    }
    function review() {
      const f = game.factSheet;
      return `<div class="panel review"><div class="panel-head"><span class="panel-title">Review the case file</span><span class="stage-count">Intake complete</span></div><div class="panel-body"><div class="review-grid"><div class="review-card"><h3>Your theory</h3>${list(f.theory)}</div><div class="review-card"><h3>Supporting record</h3>${list([...(f.supportingFacts||[]),...(f.corroboratedFacts||[])].slice(0,6))}</div><div class="review-card"><h3>Risks & missing proof</h3>${list([...(f.risks||[]),...(f.missingEvidence||[])].slice(0,6))}</div></div><div class="review-action"><button id="enter-court" class="primary">Finalize and enter court <span class="arrow">→</span></button></div></div></div>`;
    }
    async function submitQuestion(event) {
      event.preventDefault(); if (busy) return;
      const value = document.getElementById("question").value.trim(); if (!value) return;
      setBusy(true, "Maya is answering");
      try { const data = await request("/interview", { method:"POST", body:JSON.stringify({ question:value }) }); game=data.caseSession; busy=false; render(); }
      catch(error){ busy=false; render(); toast(error.message,true); }
    }
    async function finalize() {
      if (busy) return; setBusy(true,"Convening the court");
      try { const data=await request("/finalize",{method:"POST",body:"{}"}); game=data.caseSession; busy=false; render(); }
      catch(error){ busy=false; render(); toast(error.message,true); }
    }
    function renderCourt() {
      const used=game.limits.courtroom.used;
      const entries=(game.courtroomTranscript||[]).map(m=>`<div class="message ${m.speaker === "player" ? "player" : "opponent"}"><span class="round-tag">Round ${esc(m.round)}</span><span class="speaker">${m.speaker === "player" ? "You, for Maya Chen" : "Harbor Point counsel"}</span>${esc(m.text)}</div>`).join("");
      app.innerHTML=`<section class="workspace court">${header()}<div class="panel"><div class="panel-head"><span class="panel-title">Before the court</span><span class="stage-count">Make a record-bound argument</span></div><div class="panel-body"><div id="transcript" class="transcript">${entries || `<div class="message opponent"><span class="speaker">The Court</span>Counsel for Maya Chen may present an opening argument.</div>`}</div></div><form id="court-form" class="composer"><textarea id="argument" maxlength="1600" required placeholder="Argue from the facts you uncovered. Address the deductions, proof, and relief…"></textarea><div class="compose-row"><span class="hint">Argument ${used+1} of 3 · Enter to send</span><button class="secondary" type="submit">Address the court →</button></div></form></div><aside class="panel side"><div class="panel-head"><span class="panel-title">Bench score</span></div><div class="panel-body"><div class="score"><div class="score-box"><span class="brief-label">Your advocacy</span><span class="score-num you">${esc(game.score.player)}</span></div><div class="score-box"><span class="brief-label">Opponent</span><span class="score-num them">${esc(game.score.opponent)}</span></div></div>${game.score.lastBenchSignal ? `<div class="bench"><span class="speaker">Bench signal</span>${esc(game.score.lastBenchSignal)}</div>` : ""}<div class="brief-item"><div class="brief-label">Strongest facts</div>${list([...(game.factSheet.supportingFacts||[]),...(game.factSheet.corroboratedFacts||[])].slice(0,5))}</div></div></aside></section>`;
      scrollTranscript(); const form=document.getElementById("court-form"); form.onsubmit=submitArgument; bindEnterToSubmit(document.getElementById("argument"),form);
    }
    async function submitArgument(event){event.preventDefault();if(busy)return;const value=document.getElementById("argument").value.trim();if(!value)return;setBusy(true,game.limits.courtroom.used===2?"The judge is preparing a verdict":"Opposing counsel is responding");try{const data=await request("/courtroom",{method:"POST",body:JSON.stringify({argument:value})});game=data.caseSession;busy=false;render()}catch(error){busy=false;render();toast(error.message,true)}}
    function renderVerdict(){const v=game.verdict||{},winner=v.winner==="player"?"Maya Chen prevails":v.winner==="opponent"?"Harbor Point prevails":"Split decision";app.innerHTML=`<section class="verdict"><div class="seal">§</div><div class="eyebrow" style="margin-top:22px">Final ruling</div><h1 class="verdict-title">Judgment entered.</h1><div class="result-chip">${esc(winner)} · ${esc(game.score.player)}–${esc(game.score.opponent)}</div><p class="ruling">${esc(v.summary)}</p><div class="verdict-grid"><div class="verdict-card"><h3>What helped your case</h3>${list(v.highlights||[])}</div><div class="verdict-card concerns"><h3>What weakened it</h3>${list(v.concerns||[])}</div></div><div class="cta"><h2>Your next case is waiting.</h2><p>Play new disputes, build your lawyer profile, challenge real players, and argue before AI judges in the full Legal Arena.</p><a class="primary" href="https://legalarena.app" target="_blank" rel="noopener noreferrer">Enter Legal Arena <span class="arrow">→</span></a></div></section>`}
    function scrollTranscript(){requestAnimationFrame(()=>{const el=document.getElementById("transcript");if(el)el.scrollTop=el.scrollHeight})}
    function render(){if(!game)return landing();if(game.stage==="interview")return renderIntake();if(game.stage==="courtroom")return renderCourt();if(game.stage==="verdict")return renderVerdict();renderError(new Error("This demo case is no longer active."))}
    token ? resume() : landing();
  })();
  </script>
</body>
</html>
